services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - '127.0.0.1:5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d postgres']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  loki:
    image: grafana/loki:latest
    command: ['-config.file=/etc/loki/loki-config.yml']
    ports:
      - '127.0.0.1:3100:3100'
    volumes:
      - ./docker/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    healthcheck:
      # grafana/loki is distroless (no shell/wget since v3.6); the loki binary ships a
      # built-in `-health` flag that probes its own /ready endpoint and exits non-zero
      # until the ingester ring is live. See docs/OVERVIEW.md §8.
      test: ['CMD', '/usr/bin/loki', '-health']
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  tempo:
    image: grafana/tempo:latest
    command: ['-config.file=/etc/tempo/tempo-config.yml']
    ports:
      - '127.0.0.1:3200:3200'
    volumes:
      - ./docker/tempo/tempo-config.yml:/etc/tempo/tempo-config.yml:ro
      - tempo-data:/var/tempo
    healthcheck:
      # grafana/tempo is distroless (no shell/wget); the tempo binary ships a built-in
      # `-health` flag that probes its own /ready endpoint (default http://localhost:3200/ready).
      test: ['CMD', '/tempo', '-health']
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  otel-collector:
    image: otel/opentelemetry-collector:latest
    command: ['--config=/etc/otelcol/config.yml']
    ports:
      - '127.0.0.1:4317:4317' # OTLP gRPC
      - '127.0.0.1:4318:4318' # OTLP HTTP
    volumes:
      - ./docker/otel-collector/config.yml:/etc/otelcol/config.yml:ro
    depends_on:
      loki:
        condition: service_healthy
      tempo:
        condition: service_healthy
    healthcheck:
      # otel/opentelemetry-collector is distroless with no in-image HTTP client, so the
      # /ready-style probe of the spec is impossible here. The container healthcheck is a
      # liveness check (the binary runs ⇒ the single collector process is serving OTLP);
      # the health_check extension (docker/otel-collector/config.yml) stays available on
      # :13133 for external probes on the Compose network.
      test: ['CMD', '/otelcol', '--version']
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  grafana:
    image: grafana/grafana:latest
    environment:
      # dev-only: anonymous Admin removes the login wall for the demo. Safe here because
      # every published port is loopback-bound (127.0.0.1) — never enable this when exposed.
      GF_AUTH_ANONYMOUS_ENABLED: 'true'
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: 'true'
      GF_FEATURE_TOGGLES_ENABLE: traceQLStreaming
    ports:
      - '127.0.0.1:3000:3000'
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      loki:
        condition: service_healthy
      tempo:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O- http://localhost:3000/api/health | grep -q ok || exit 1']
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

volumes:
  postgres-data:
  loki-data:
  tempo-data:
  grafana-data:
