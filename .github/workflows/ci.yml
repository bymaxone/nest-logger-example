name: CI

on:
  push:
    branches: [main, next]
  pull_request:
    branches: [main, next]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  install:
    name: Install dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 10.8.0
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: pnpm
      - run: pnpm install --frozen-lockfile

  lint:
    name: Lint
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 10.8.0
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  typecheck:
    name: Typecheck
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 10.8.0
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  unit:
    name: Unit tests + coverage
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 10.8.0
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run unit tests with coverage
        run: pnpm test:cov
      - name: Upload API coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit-api
          path: apps/api/coverage/
          retention-days: 7
      - name: Upload web coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit-web
          path: apps/web/coverage/
          retention-days: 7

  e2e-api:
    name: E2E — apps/api
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 10.8.0
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Start test infrastructure
        run: docker compose -f docker-compose.test.yml up -d --wait
      - name: Run API e2e tests
        run: pnpm --filter @nest-logger-example/api run test:e2e
      - name: Stop test infrastructure
        if: always()
        run: docker compose -f docker-compose.test.yml down -v

  e2e-web:
    name: E2E — apps/web
    needs: e2e-api
    runs-on: ubuntu-latest
    timeout-minutes: 30
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble
      options: --user root
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 10.8.0
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build API
        run: pnpm --filter @nest-logger-example/api run build
      - name: Build web
        run: pnpm --filter web run build
      - name: Run web e2e tests
        run: pnpm --filter web run test:e2e
      - name: Upload Playwright results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: apps/web/test-results/
          retention-days: 7

  export-usage-check:
    name: Export usage + log-key audits
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 10.8.0
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Audit library export usage
        run: pnpm audit:exports
      - name: Audit log-key convention
        run: pnpm audit:log-keys

  coverage-report:
    name: Coverage report
    needs: [unit, e2e-api, e2e-web]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Download API coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-unit-api
          path: coverage/api
        continue-on-error: true
      - name: Download web coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-unit-web
          path: coverage/web
        continue-on-error: true
      - name: Upload combined coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-combined
          path: coverage/
          retention-days: 30
