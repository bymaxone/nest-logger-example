# Tempo 3.0 monolithic local config. NOTE: Tempo 3.0 removed the top-level
# `ingester:` and `compactor:` blocks; single-binary mode runs on their built-in
# defaults, so they are intentionally absent here. See docs/OVERVIEW.md §8.
stream_over_http_enabled: true # enables Grafana's traceQLStreaming feature toggle

server:
  http_listen_port: 3200
  log_level: warn

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

storage:
  trace:
    backend: local
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks

usage_report:
  reporting_enabled: false # no phone-home from the local demo stack
