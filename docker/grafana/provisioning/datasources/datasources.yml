apiVersion: 1

datasources:
  - name: Loki
    uid: loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: true
    jsonData:
      # Turn `traceId` (apps/api, camelCase) or `trace_id` (apps/worker, snake_case) in any log
      # line into a click-through to Tempo. The capture group is a W3C trace id: exactly 32
      # lowercase hex chars (matches the canonical derived-field spec in docs/tasks P9-2).
      derivedFields:
        - name: traceId
          matcherRegex: '"trace_?[iI]d":"([a-f0-9]{32})"'
          url: '${__value.raw}'
          datasourceUid: tempo
          urlDisplayLabel: 'View trace'

  - name: Tempo
    uid: tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    jsonData:
      # Reverse pivot: from a trace span jump back to its Loki logs.
      tracesToLogsV2:
        datasourceUid: loki
        spanStartTimeShift: '-1h'
        spanEndTimeShift: '1h'
        filterByTraceID: true
        tags:
          # Map the Tempo span resource attr `service.name` to the Loki label that the
          # PRIMARY path (LokiDestination) sets directly: `stream: { service }`. The
          # alternative OTLP-collector path promotes service.name → `service_name` instead;
          # if that path is ever made primary, switch this value to `service_name`.
          - key: service.name
            value: service
      nodeGraph:
        enabled: true
