name: nest-logger-example-prod

# Production-shaped stack built from the published GHCR images plus the same
# observability backend as the dev `docker-compose.yml`. Every published port is
# loopback-bound (127.0.0.1) and all runtime config is read from `.env` — no
# secret is hardcoded here.
#
# IMPORTANT: the api/web containers reach the backing services by their compose
# service names, so `.env` must use in-network hosts instead of `localhost`:
#   - DATABASE_URL          -> host `postgres`        (port 5432)
#   - LOKI_URL / LOKI_QUERY_URL -> host `loki`        (port 3100)
#   - OTLP_TRACE_ENDPOINT   -> host `otel-collector`  (port 4318)
# Pin the image tag with `TAG=v1.2.3 docker compose -f docker-compose.prod.yml up -d`.
#
# NOTE: apps/worker has no published image (release.yml builds api + web only), so
# it is intentionally absent from this stack; run it from source when exercising
# the cross-service tracing demo.

services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-logger_example}
    ports:
      - '127.0.0.1:5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-logger_example}']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  loki:
    image: grafana/loki:latest
    command: ['-config.file=/etc/loki/loki-config.yml']
    ports:
      - '127.0.0.1:3100:3100'
    volumes:
      - ./docker/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    healthcheck:
      test: ['CMD', '/usr/bin/loki', '-health']
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped

  tempo:
    image: grafana/tempo:latest
    command: ['-config.file=/etc/tempo/tempo-config.yml']
    ports:
      - '127.0.0.1:3200:3200'
    volumes:
      - ./docker/tempo/tempo-config.yml:/etc/tempo/tempo-config.yml:ro
      - tempo-data:/var/tempo
    healthcheck:
      test: ['CMD', '/tempo', '-health']
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector:latest
    command: ['--config=/etc/otelcol/config.yml']
    ports:
      - '127.0.0.1:4317:4317' # OTLP gRPC
      - '127.0.0.1:4318:4318' # OTLP HTTP
    volumes:
      - ./docker/otel-collector/config.yml:/etc/otelcol/config.yml:ro
    depends_on:
      loki:
        condition: service_healthy
      tempo:
        condition: service_healthy
    healthcheck:
      test: ['CMD', '/otelcol', '--version']
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    environment:
      # Demo-only anonymous admin, identical to the dev stack. Safe only because
      # every port is loopback-bound — never enable when the host is exposed.
      GF_AUTH_ANONYMOUS_ENABLED: 'true'
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: 'true'
      GF_FEATURE_TOGGLES_ENABLE: traceQLStreaming
    ports:
      - '127.0.0.1:3000:3000'
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      loki:
        condition: service_healthy
      tempo:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O- http://localhost:3000/api/health | grep -q ok || exit 1']
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  api:
    image: ghcr.io/bymaxone/nest-logger-example-api:${TAG:-latest}
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      otel-collector:
        condition: service_healthy
    ports:
      - '127.0.0.1:3001:3001'
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O- http://localhost:3001/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  web:
    image: ghcr.io/bymaxone/nest-logger-example-web:${TAG:-latest}
    env_file: .env
    depends_on:
      api:
        condition: service_healthy
    ports:
      - '127.0.0.1:3003:3003'
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O- http://localhost:3003 || exit 1']
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped

volumes:
  postgres-data:
  loki-data:
  tempo-data:
  grafana-data:
